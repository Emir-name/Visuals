name: Build mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # No local gradlew wrapper is committed, so we install Gradle directly
      # and run the Fabric Loom build with it.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build mod jar
        run: gradle build --no-daemon --stacktrace

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: ImpactVisuals-jar
          path: build/libs/*.jar
